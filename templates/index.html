<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Image Processing</title>
        <script>
            async function fetchLatestImage() {
                try {
                    const response = await fetch("/latest_image");
                    if (response.ok) {
                        const blob = await response.blob();
                        const url = URL.createObjectURL(blob);
                        document.getElementById("latestImage").src = url;
                    } else {
                        console.error("Failed to fetch latest image");
                    }
                } catch (error) {
                    console.error("Error:", error);
                }
            }

            setInterval(fetchLatestImage, 1000); // 1초마다 최신 이미지 요청
        </script>
    </head>
    <body>
        <h1>Raspberry PICO Inspection</h1>
        <img
            id="latestImage"
            src=""
            alt="Latest Image"
            style="max-width: 400px; border: 1px solid #ccc"
        />
    </body>
</html>
