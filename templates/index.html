<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Flask 실시간 이미지</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    </head>
    <body>
        <h1>실시간 이미지</h1>
        <button id="toggle-btn">프로그램 시작</button>
        <h2>실시간 이미지</h2>
        <img id="live-image" src="" alt="Live Image" width="640" height="480" />

        <script>
            $(document).ready(function () {
                // WebSocket 연결 설정
                var socket = io.connect(
                    "http://" + document.domain + ":" + location.port
                );

                // 서버로부터 이미지를 받았을 때 처리하는 이벤트 리스너
                socket.on("new_image", function (data) {
                    // base64로 받은 이미지를 img 태그의 src에 넣어주기
                    $("#live-image").attr(
                        "src",
                        "data:image/jpeg;base64," + data.image
                    );
                });

                $("#toggle-btn").click(function () {
                    $.post("/toggle_program", function (data) {
                        if (data.status === "started") {
                            $("#toggle-btn").text("프로그램 종료");
                        } else {
                            $("#toggle-btn").text("프로그램 시작");
                        }
                    });
                });
            });
        </script>
    </body>
</html>
